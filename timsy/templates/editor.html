{% extends "base.html" %}
{% load static %}

{% block extra_head %}
{{ form.media }}
<style>
    input[readonly] {
        background-color: #f0f0f0 !important;
        color: #666 !important;
    }
    .invalid-place {
        border: 2px solid red;
        background-color: #fff0f0;
    }
</style>
{% endblock %}

{% block content %}
{% block header %}{% endblock %}

<form action="{{ form_action }}" method="POST" onsubmit="return validateAllPlaces(validPlaces)"> {% csrf_token %}
    {% block form_content %}{% endblock %}
    
    <div style="margin-top: 20px;">
        <button type="submit" class="btn btn-primary">Save</button>
    </div>
</form>
{% endblock %}

{% block extra_js %}
<script type="text/javascript">
    // List of valid place abbreviations
    const validPlaces = {{ form.place_list|safe }};

    function setNextStartField(row) {
        const current_id = parseInt(row, 10);
        const next_id = current_id + 1;

        const start = document.querySelector(`#id_start${current_id}, #id_form-${current_id}-start`).value.split(":");
        let duration = document.querySelector(`#id_duration${current_id}, #id_form-${current_id}-duration`).value.split(":");
        let hours = 0;
        let minutes = 0;
        if (isNaN(duration[1])) { // no hours entered, just minutes
            if (document.querySelector(`#id_duration${current_id}, #id_form-${current_id}-duration`).value == "") {
                duration[0] = 0;
            }
            hours = parseInt(start[0], 10);
            minutes = parseInt(start[1], 10) + parseInt(duration[0], 10);
            showTime(`id_duration${current_id}`, 0, parseInt(duration[0], 10));
        }
        else {
            hours = parseInt(start[0], 10) + parseInt(duration[0], 10);
            minutes = parseInt(start[1], 10) + parseInt(duration[1], 10);
        }

        // Check if the next row's start field exists before trying to update it
        const nextStartField = document.querySelector(`#id_start${next_id}, #id_form-${next_id}-start`);
        if (nextStartField) {
            showTime(`id_start${next_id}`, hours, minutes);
        }
    }

    function checkAbbreviation(row) {
        const abbreviation = document.querySelector(`#id_abbreviation${row}, #id_form-${row}-abbreviation`).value;
        if (!abbreviation) {
            return;
        }

        request = createRequest();
        if (request == null) {
            alert("Unable to create request");
            return;
        }

        const url = "/timsy/data/activities/" + abbreviation + "/";
        request.open("GET", url, true);
        request.onreadystatechange = function() { displayActivityDetail(row); };
        request.send(null);
    }

    function displayActivityDetail(row) {
        if (request.readyState == 4) {
            if (request.status == 200) {
                const record = eval('(' + request.responseText + ')');
                if (record.description) {
                    let index;
                    document.querySelector(`#id_description${row}, #id_form-${row}-description`).value = record.description;
                    let parent = document.querySelector(`#id_parent${row}, #id_form-${row}-parent`);
                    for (index = 0; index < parent.length; index = index + 1) {
                        if (parent.options[index].text == record.parent) {
                            parent.selectedIndex = index;
                        }
                    }
                    const importance = document.querySelector(`#id_importance${row}, #id_form-${row}-importance`);
                    for (index = 0; index < importance.length; index = index + 1) {
                        if (importance.options[index].text == record.importance) {
                            importance.selectedIndex = index;
                        }
                    }
                    const urgency = document.querySelector(`#id_urgency${row}, #id_form-${row}-urgency`);
                    for (index = 0; index < urgency.length; index = index + 1) {
                        if (urgency.options[index].text == record.urgency) {
                            urgency.selectedIndex = index;
                        }
                    }
                    const next_id = row + 1;
                    const nextRowDurationField = document.querySelector(`#id_duration${next_id}, #id_form-${next_id}-duration`);
                    if (nextRowDurationField) {
                        nextRowDurationField.focus();
                    }
                }
            }
        }
    }

    // Place validation functions
    function validatePlace(input, validPlaces) {
        console.log('validatePlace called with:', input.value, 'validPlaces:', validPlaces);
        const value = input.value.trim();
        // Get the row number from the input name (e.g., "place1" -> 1 or "form-1-place" -> 1)
        const rowNum = input.name.match(/(\d+)/)[0];
        const durationInput = document.querySelector(`#id_duration${rowNum}, #id_form-${rowNum}-duration`);
        const durationValue = durationInput.value.trim();
        
        // If duration is empty or "0:00", don't validate the place
        if (!durationValue || durationValue === "0:00") {
            input.classList.remove('invalid-place');
            return true;
        }
        
        // Only validate place if there's a duration
        // Check both the original value and its uppercase version
        const isValid = validPlaces.includes(value) || validPlaces.includes(value.toUpperCase());
        console.log('Place validation result:', isValid);
        
        // Update visual feedback
        input.classList.toggle('invalid-place', !isValid);
        
        return isValid;
    }

    function validateAllPlaces(validPlaces) {
        const placeInputs = document.querySelectorAll('input[name^="place"], input[name^="form-"][name$="-place"]');
        let isValid = true;
        let firstInvalidInput = null;
        
        placeInputs.forEach(input => {
            if (!validatePlace(input, validPlaces)) {
                isValid = false;
                if (!firstInvalidInput) {
                    firstInvalidInput = input;
                }
            }
        });
        
        if (firstInvalidInput) {
            firstInvalidInput.focus();
        }
        
        return isValid;
    }

    function setupPlaceValidation(validPlaces) {
        console.log('Setting up place validation with places:', validPlaces);
        const placeInputs = document.querySelectorAll('input[name^="place"], input[name^="form-"][name$="-place"]');
        console.log('Found place inputs:', placeInputs.length);
        placeInputs.forEach(input => {
            // Validate only when the field loses focus
            input.addEventListener('blur', function() {
                console.log('Validating place on blur:', this.value, 'against places:', validPlaces);
                validatePlace(this, validPlaces);
            });
        });
    }

    // Initialize place validation
    document.addEventListener('DOMContentLoaded', function() {
        setupPlaceValidation(validPlaces);
    });
</script>
{% endblock %}
